<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>お問い合わせフォーム</title>
  
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 20px auto; padding: 10px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input[type="text"], input[type="email"], textarea { width: 100%; padding: 8px; box-sizing: border-box; }
    button { background: #007bff; color: white; padding: 10px 20px; border: none; cursor: pointer; }
    button:hover { background: #0056b3; }
    button:disabled { background: #cccccc; cursor: not-allowed; }
  </style>
</head>
<body>

  <h2>お問い合わせ</h2>
  
  <form id="contact-form">
    <div class="form-group">
      <label for="name">お名前</label>
      <input type="text" id="name" name="name" required>
    </div>

    <div class="form-group">
      <label for="email">メールアドレス</label>
      <input type="email" id="email" name="email" required>
    </div>

    <div class="form-group">
      <label for="message">内容</label>
      <textarea id="message" name="message" rows="5" required></textarea>
    </div>

    <button type="submit" id="submit-btn">送信する</button>
  </form>

  <script>
    // =========================================
    // ★ ここにEmailJSの設定を入力してください ★
    // =========================================
    const PUBLIC_KEY = "YOUR_PUBLIC_KEY";       // 例: "aBcDeFgHiJkLmNoP"
    const SERVICE_ID = "YOUR_SERVICE_ID";       // 例: "service_xxxxx"
    const TEMPLATE_ID = "YOUR_TEMPLATE_ID";     // 例: "template_xxxxx"

    // EmailJSの初期化
    (function(){
      emailjs.init(PUBLIC_KEY);
    })();

    // フォーム送信時の処理
    document.getElementById('contact-form').addEventListener('submit', function(event) {
      // 画面がリロードされるのを防ぐ
      event.preventDefault();

      if (PUBLIC_KEY === "YOUR_PUBLIC_KEY") {
        alert("EmailJSの初期設定（PUBLIC_KEYなど）が完了していません。コードを書き換えてください。");
        return;
      }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerText = "送信中...";

      // 入力されたデータを取得
      const templateParams = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        message: document.getElementById('message').value
      };

      // EmailJSを使って送信
      emailjs.send(SERVICE_ID, TEMPLATE_ID, templateParams)
        .then(function(response) {
            alert("お問い合わせを送信しました！");
            document.getElementById('contact-form').reset(); // フォームを空にする
        }, function(error) {
            alert("送信に失敗しました。\nエラー詳細: " + JSON.stringify(error));
        })
        .finally(function() {
            btn.disabled = false;
            btn.innerText = "送信する";
        });
    });
  </script>

</body>
</html>
